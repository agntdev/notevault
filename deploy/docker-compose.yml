# Local dev compose: Postgres + backend container. The frontend runs via Vite
# (`npm run dev`) outside Docker so HMR is snappy. Run:
#
#   docker compose -f deploy/docker-compose.yml up --build
#
# The first start applies migrations automatically (see the `migrate` service).
# Postgres data persists in the named volume `notevault-pgdata`.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notevault
      POSTGRES_PASSWORD: notevault
      POSTGRES_DB: notevault
    volumes:
      - notevault-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notevault"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: node:20-alpine
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app/db
    environment:
      DATABASE_URL: postgres://notevault:notevault@postgres:5432/notevault
    volumes:
      - ../db:/app/db
    command: sh -c "npm install --no-audit --no-fund && node migrate.mjs && psql \"$$DATABASE_URL\" -f seed.sql"

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://notevault:notevault@postgres:5432/notevault
      JWT_SECRET: local-dev-secret-32-chars-padding____
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3001:3001"

volumes:
  notevault-pgdata:
